# Light-theme palette chosen for a healthcare-IT audience: a calm navy
# primary on near-white surfaces so tables and charts stay legible in
# meeting-room projectors.
[theme]
base = "light"
primaryColor = "#0B5394"
backgroundColor = "#FFFFFF"
secondaryBackgroundColor = "#F4F6FA"
textColor = "#1F2937"
font = "sans serif"

[client]
toolbarMode = "minimal"
