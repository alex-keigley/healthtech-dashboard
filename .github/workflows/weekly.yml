name: Weekly ingest

on:
  # Sunday 06:00 UTC. Chosen because SEC EDGAR daily index is stable by then
  # and trade-press feeds cover the full prior week.
  schedule:
    - cron: "0 6 * * 0"
  # Manual trigger for one-off runs / debugging.
  workflow_dispatch:
    inputs:
      days:
        description: "Window size in days"
        required: false
        default: "7"

concurrency:
  group: weekly-ingest
  cancel-in-progress: false

permissions:
  contents: write

jobs:
  ingest:
    runs-on: ubuntu-latest
    timeout-minutes: 30
    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          fetch-depth: 0
          persist-credentials: true

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"
          cache: "pip"

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt

      - name: Run pipeline
        run: |
          python -m pipeline.run --days "${{ github.event.inputs.days || '7' }}"

      - name: Summarize
        run: |
          echo "### Weekly ingest" >> "$GITHUB_STEP_SUMMARY"
          echo "" >> "$GITHUB_STEP_SUMMARY"
          LATEST=$(ls -1t reports/*.md 2>/dev/null | head -n1 || true)
          if [ -n "$LATEST" ]; then
            echo "Latest report: \`$LATEST\`" >> "$GITHUB_STEP_SUMMARY"
            echo "" >> "$GITHUB_STEP_SUMMARY"
            echo '```markdown' >> "$GITHUB_STEP_SUMMARY"
            head -n 40 "$LATEST" >> "$GITHUB_STEP_SUMMARY"
            echo '```' >> "$GITHUB_STEP_SUMMARY"
          fi

      - name: Commit refreshed data
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add data/startups.db reports/ review/ || true
          if git diff --staged --quiet; then
            echo "No data changes to commit."
          else
            WEEK=$(date -u +"%Y-%m-%d")
            git commit -m "Weekly ingest $WEEK"
            git push
          fi
